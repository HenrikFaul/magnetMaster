name: Build Magnet Master APK

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/MagnetMaster-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk dist/MagnetMaster-release-unsigned.apk || true
          ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MagnetMaster-APK
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
